worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    gzip on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;
    gzip_min_length 512;

    client_max_body_size 1m;

    upstream cart_api {
        least_conn;
        server api1:8000 max_fails=3 fail_timeout=10s;
        server api2:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream cart_frontend {
        server frontend:80 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # --- API routes (proxy to FastAPI replicas) ---

        location = /healthz {
            proxy_pass http://cart_api/healthz;
            access_log off;
        }

        location /auth/ {
            proxy_pass http://cart_api;
        }

        location = /checkout {
            proxy_pass http://cart_api/checkout;
        }

        # FastAPI auto-docs (handy in dev)
        location = /docs {
            proxy_pass http://cart_api/docs;
        }
        location = /redoc {
            proxy_pass http://cart_api/redoc;
        }
        location = /openapi.json {
            proxy_pass http://cart_api/openapi.json;
        }

        # --- SPA (everything else) ---

        location / {
            proxy_pass http://cart_frontend;
        }
    }
}
